services:
  app:
    image: ${OPERNIXIT_IMAGE:?Set OPERNIXIT_IMAGE}:${OPERNIXIT_VERSION:-latest}
    container_name: opernixit-app
    restart: unless-stopped
    pull_policy: always
    command: gunicorn -w 1 -b 0.0.0.0:5000 "app:create_app()"
    environment:
      OPERNIXIT_AUTO_RESTART: "1"
      CONFIG_DIR: /app/config
      UPLOAD_DIR: /app/data/uploads
      TZ: ${TZ:-Europe/Istanbul}
    ports:
      - "${OPERNIXIT_PORT:-5000}:5000"
    volumes:
      - opernixit_config:/app/config
      - opernixit_uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: opernixit-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opernixit}
      POSTGRES_USER: ${POSTGRES_USER:-opernixit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      TZ: ${TZ:-Europe/Istanbul}
    volumes:
      - opernixit_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opernixit} -d ${POSTGRES_DB:-opernixit}"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  opernixit_postgres:
  opernixit_config:
  opernixit_uploads:
